# Decap CMS：GitHub 后端 + 本站 /api/auth OAuth（Vercel）
# 请在主站域名打开 /admin/，GitHub OAuth 回调：https://blog.bobotou118.dpdns.org/api/callback
backend:
  name: github
  repo: bobotouo/blog
  branch: main
  base_url: https://blog.bobotou118.dpdns.org
  auth_endpoint: api/auth

site_url: https://blog.bobotou118.dpdns.org
display_url: https://blog.bobotou118.dpdns.org

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "博客"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "封面", name: "coverImage", widget: "image", required: false }
      - { label: "内容", name: "body", widget: "markdown" }

  - name: "snapshots"
    label: "日常快照"
    folder: "content/snapshots"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "一句话", name: "summary", widget: "string", required: false }
      - { label: "地点", name: "location", widget: "string", required: false }
      - { label: "心情", name: "mood", widget: "string", required: false }
      - { label: "图片", name: "images", widget: "list", required: false, field: { label: "图片", name: "image", widget: "image" } }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "内容", name: "body", widget: "markdown" }
