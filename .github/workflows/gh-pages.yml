name: Deploy to GitHub Pages

# 静态镜像站（/blog/ 子路径）；主站与 API 在 Vercel
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  # 在仓库 Settings → Variables 配置 VERCEL_SITE_URL，或沿用默认自定义域
  BACKEND_SITE_URL: ${{ vars.VERCEL_SITE_URL || 'https://blog.bobotou118.dpdns.org' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NUXT_APP_BASE_URL: /blog/
          NUXT_APP_CDN_URL: /blog/
          NITRO_PRESET: static
          NUXT_GH_PAGES: "true"
          NUXT_PUBLIC_GISCUS_REPO: bobotouo/blog
          NUXT_PUBLIC_GISCUS_REPO_ID: R_kgDORMxRqg
          NUXT_PUBLIC_GISCUS_CATEGORY: Announcements
          NUXT_PUBLIC_GISCUS_CATEGORY_ID: DIC_kwDORMxRqs4C2IoF
          NUXT_PUBLIC_GISCUS_THEME: dark_dimmed
          # GitHub Pages 无 /api，评论与统计走 Vercel 主站
          NUXT_PUBLIC_COMMENTS_API_BASE: ${{ env.BACKEND_SITE_URL }}
          NUXT_PUBLIC_STATS_BASE: ${{ env.BACKEND_SITE_URL }}
        run: pnpm generate

      - name: Copy SPA shell (200.html) to 404.html so refresh keeps current route
        run: cp .output/public/200.html .output/public/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/public
          enable_jekyll: false
