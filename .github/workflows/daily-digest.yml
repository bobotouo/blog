name: Daily Digest Posts

on:
  schedule:
    # 每天 UTC 07:00（北京时间 15:00）
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate daily digest posts
        env:
          JIN10_COOKIE: ${{ secrets.JIN10_COOKIE }}
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DAILY_DIGEST_ENABLE_LLM: ${{ secrets.DAILY_DIGEST_ENABLE_LLM }}
          DAILY_DIGEST_LLM_MODEL: ${{ secrets.DAILY_DIGEST_LLM_MODEL }}
          DAILY_DIGEST_LLM_BASE_URL: ${{ secrets.DAILY_DIGEST_LLM_BASE_URL }}
          # 2 分钟超时，避免 CI 网络抖动导致 LLM 回退模板
          DAILY_DIGEST_HTTP_TIMEOUT_MS: "120000"
        run: pnpm daily:digest

      - name: Refresh static blog index JSON
        run: node scripts/generate-blog-list.mjs

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(content): add daily finance and tech digests"
          file_pattern: "content/blog/*.md public/blog-list.json public/blog/*.json"
